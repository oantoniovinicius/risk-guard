spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: risk-guard

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${RABBITMQ_DEFAULT_USER}
    password: ${RABBITMQ_DEFAULT_PASS}

app:
  messaging:
    exchange: ${APP_MESSAGING_EXCHANGE:riskguard.events}
    consumer:
      transaction-created-queue: ${TRANSACTION_CREATED_QUEUE:riskguard.risk.transaction-created}
      transaction-analyzed-queue: ${TRANSACTION_ANALYZED_QUEUE:riskguard.banking.transaction-analyzed}
      transaction-status-queue: ${TRANSACTION_STATUS_QUEUE:riskguard.notification.transaction-status}
    routing:
      transaction-created: ${TRANSACTION_CREATED_ROUTING_KEY:transaction.created}
      transaction-analyzed: ${TRANSACTION_ANALYZED_ROUTING_KEY:transaction.analyzed}
      transaction-status: ${TRANSACTION_STATUS_ROUTING_KEY:transaction.*}
